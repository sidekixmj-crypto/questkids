<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avatar Room Module</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#f0eaf8;font-family:'Segoe UI',sans-serif;touch-action:none;}
img{image-rendering:pixelated;image-rendering:crisp-edges;}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#fff;box-shadow:0 0 20px rgba(0,0,0,.15);}

/* ===== SCENE (상단 50%) ===== */
#scene{
  position:relative;flex:0 0 45vh;min-height:180px;overflow:hidden;
  background:#c8e6f8;border-bottom:3px solid #a0c4e8;
  touch-action:none; user-select:none;}
#room-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  image-rendering:pixelated;transition:background-image .3s;
}
#furniture-layer{position:absolute;inset:0;pointer-events:auto;z-index:8;}
.furniture-item{
  position:absolute;width:96px;height:96px;cursor:grab;
  image-rendering:pixelated;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3));
  user-select:none;pointer-events:all;
  transition:box-shadow .1s;
  transform-origin:bottom center;
  z-index:10;
  touch-action:none;
}
.furniture-item:active{cursor:grabbing;}
.furniture-item.furn-selected{
  box-shadow:0 0 0 2px #ffe066, 0 2px 8px rgba(255,200,0,.5);
}
#avatar-wrap{
  position:absolute;bottom:10%;left:50%;transform:translateX(-50%);
  width:120px;height:120px;
  overflow:visible;
  touch-action:none;
  cursor:grab;
  z-index:12;
  -webkit-user-select:none; user-select:none;
}
#avatar-wrap:active { cursor:grabbing; }
#avatar-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;}
#pet-wrap{
  position:absolute;bottom:10%;left:calc(50% + 65px);
  width:56px;height:56px;
  touch-action:none;
  z-index:11;
  cursor:grab;
}
#pet-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;}
#couple-on-pet{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;
}
#coin-hud{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.55);color:#ffe066;font-size:12px;font-weight:700;
  padding:4px 8px;border-radius:12px;letter-spacing:.5px;
}
#lv-hud{
  position:absolute;top:8px;left:8px;
  background:rgba(80,40,160,.7);color:#fff;font-size:11px;font-weight:700;
  padding:4px 7px;border-radius:12px;
}
#scene-msg{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 10px;border-radius:8px;
  opacity:0;transition:opacity .4s;white-space:nowrap;
}

/* ===== TAB BAR ===== */
#tabs{
  display:flex;background:#5c35a0;padding:0;flex-shrink:0;
  border-bottom:2px solid #3d1f80;
}
.tab-btn{
  flex:1;padding:8px 0;border:none;background:transparent;
  color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:background .2s,color .2s;
}
.tab-btn .ti{font-size:16px;}
.tab-btn.active{background:rgba(255,255,255,.2);color:#ffe066;border-bottom:2px solid #ffe066;}
.tab-btn:hover{background:rgba(255,255,255,.1);}

/* ===== PANEL ===== */
#panel{flex:1;overflow-y:auto;overflow-x:hidden;background:#f7f2ff;}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:#c0a0e0;border-radius:2px;}

/* ===== SECTION HEADER ===== */
.sec-head{
  background:#e8dcf8;padding:6px 12px;font-size:11px;font-weight:700;
  color:#5c35a0;letter-spacing:.5px;text-transform:uppercase;
  border-bottom:1px solid #d0b8f0;position:sticky;top:0;z-index:2;
}

/* ===== ITEM GRID ===== */
.item-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;padding:8px;
}
.item-card{
  background:#fff;border:2px solid #e0d0f8;border-radius:8px;
  padding:6px;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:border-color .2s,transform .1s,box-shadow .2s;
  position:relative;min-height:70px;
}
.item-card:hover{border-color:#a060e0;box-shadow:0 2px 8px rgba(160,96,224,.3);}
.item-card.equipped{border-color:#5c35a0;background:#f0e8ff;box-shadow:0 0 0 2px #a060e0;}
.item-card.locked{opacity:.55;cursor:not-allowed;}
.item-card img{width:48px;height:48px;object-fit:contain;}
.item-card .iname{font-size:9px;color:#666;margin-top:3px;text-align:center;line-height:1.2;}
.item-card .iprice{
  font-size:9px;color:#c07000;font-weight:700;
  background:#fff8e0;padding:1px 4px;border-radius:4px;margin-top:2px;
}
.item-card .lock-icon{
  position:absolute;top:3px;right:3px;font-size:12px;
}
.item-card.free-badge::after{
  content:'FREE';position:absolute;top:2px;left:2px;
  font-size:7px;font-weight:800;color:#fff;background:#22b060;
  padding:1px 3px;border-radius:3px;
}


/* ===== DEV UNLOCK BTN ===== */
#dev-unlock-btn{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(255,200,0,.85);color:#333;font-size:10px;font-weight:700;
  border:none;border-radius:8px;padding:3px 10px;cursor:pointer;z-index:100;
  display:none;
}

/* ===== AVATAR SELECTOR ===== */
.avatar-selector{
  display:flex;gap:8px;padding:10px;overflow-x:auto;
}
.avatar-option{
  flex-shrink:0;border:2px solid #e0d0f8;border-radius:10px;padding:6px;
  cursor:pointer;text-align:center;background:#fff;transition:border-color .2s;
  width:64px;
}
.avatar-option img{width:48px;height:56px;object-fit:contain;}
.avatar-option span{font-size:9px;color:#666;display:block;margin-top:3px;}
.avatar-option.selected{border-color:#5c35a0;background:#f0e8ff;}

/* ===== EXPRESSION SELECTOR ===== */
.expr-row{display:flex;gap:6px;padding:6px 10px;}
.expr-btn{
  flex:1;padding:6px 4px;border:1px solid #d0b8f0;border-radius:6px;
  background:#fff;cursor:pointer;font-size:10px;text-align:center;transition:background .2s;
}
.expr-btn.active{background:#a060e0;color:#fff;border-color:#5c35a0;}

/* ===== FURNITURE PLACEMENT ===== */
#furniture-tray{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;padding:10px;
  border-top:1px solid #e0d0f8;
  overflow-y:visible;
}
.furn-tray-item{
  width:100%;aspect-ratio:1;min-height:72px;border:2px solid #e0d0f8;border-radius:8px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;transition:border-color .2s,box-shadow .2s;
}
.furn-tray-item:hover{border-color:#a060e0;box-shadow:0 2px 8px rgba(160,96,224,.3);}
.furn-tray-item.placed{border-color:#5c35a0;background:#f0e8ff;box-shadow:0 0 0 2px #a060e0;}
.furn-tray-item img{width:56px;height:56px;object-fit:contain;}
.furn-tray-item .fname{font-size:9px;color:#666;margin-top:2px;text-align:center;line-height:1.2;}
.furn-tray-item .fcount{
  position:absolute;top:1px;right:2px;font-size:8px;font-weight:700;color:#5c35a0;
}
#place-hint{
  font-size:11px;color:#888;text-align:center;padding:6px;
  background:#f0e8ff;border-radius:6px;margin:4px 8px;
}

/* ===== BUY CONFIRM MODAL ===== */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:100;align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex;}
#modal-box{
  background:#fff;border-radius:16px;padding:20px;max-width:280px;width:90%;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);
}
#modal-box h3{font-size:14px;color:#3d1f80;margin-bottom:8px;}
#modal-box p{font-size:12px;color:#666;margin-bottom:14px;}
#modal-box .mimg{width:72px;height:72px;object-fit:contain;margin:0 auto 8px;display:block;}
.modal-btns{display:flex;gap:8px;}
.mbtn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
.mbtn-cancel{background:#eee;color:#666;}
.mbtn-buy{background:#5c35a0;color:#fff;}
.mbtn-buy:disabled{background:#aaa;cursor:not-allowed;}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:12px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;}

/* ===== SCROLLBAR HIDE for tray ===== */
.avatar-selector::-webkit-scrollbar,
#furniture-tray::-webkit-scrollbar{height:3px;}
.avatar-selector::-webkit-scrollbar-thumb,
#furniture-tray::-webkit-scrollbar-thumb{background:#c0a0e0;}

/* ===== LAYER ADJUST MODE ===== */
/* 컨트롤 바 (씬 외부, 씬-탭 사이) */
#layer-ctrl-bar{
  display:flex;align-items:center;flex-shrink:0;
  background:#2e1860;padding:4px 8px;gap:6px;
  border-bottom:1px solid #1a0a40;
  min-height:36px;overflow-x:auto;overflow-y:hidden;
}
#layer-ctrl-bar::-webkit-scrollbar{height:2px;}
#layer-ctrl-bar::-webkit-scrollbar-thumb{background:#6040a0;}
#layer-edit-btn{
  background:rgba(255,220,80,.15);color:#ffe066;font-size:10px;font-weight:700;
  border:1px solid rgba(255,220,80,.4);border-radius:8px;padding:4px 10px;
  cursor:pointer;user-select:none;white-space:nowrap;flex-shrink:0;
  transition:background .2s;
}
#layer-edit-btn:hover{background:rgba(255,220,80,.3);}
#layer-reset-btn{
  background:rgba(220,60,60,.7);color:#fff;font-size:10px;font-weight:700;
  border:none;border-radius:8px;padding:4px 9px;
  cursor:pointer;user-select:none;display:none;white-space:nowrap;flex-shrink:0;
}
/* 편집모드: layer-edit-mode 클래스 */
#avatar-wrap img:not(#av-body){pointer-events:none;}
#scene.layer-edit-mode #avatar-wrap img:not(#av-body){pointer-events:auto !important;cursor:grab;}
#scene.layer-edit-mode #avatar-wrap img.av-layer-active{
  pointer-events:auto !important;cursor:grab;
  outline:2px dashed rgba(255,220,60,.8);border-radius:4px;
}
#scene.layer-edit-mode #avatar-wrap img.av-layer-active:active{cursor:grabbing;outline:2px solid #ffe066;}
/* 크기 힌트 */
#layer-scale-hint{
  font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap;
  display:none;flex-shrink:0;
}
#layer-ctrl-bar.edit-mode #layer-scale-hint{display:block;}
/* 레이어 슬롯 선택 패널 */
#layer-slot-panel{
  display:none;flex-direction:row;gap:3px;
  overflow-x:auto;flex:1;
}
#layer-ctrl-bar.edit-mode #layer-slot-panel{display:flex;}
.layer-slot-btn{
  font-size:10px;padding:3px 7px;border:none;border-radius:6px;
  cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);
  transition:background .15s;white-space:nowrap;flex-shrink:0;
}
.layer-slot-btn:hover{background:rgba(255,255,255,.28);}
.layer-slot-btn.active{background:#ffe066;color:#3a2060;font-weight:700;}
/* 활성 레이어 아웃라인 */
#avatar-wrap img.av-layer-selected{
  outline:2px dashed #ffe066 !important;outline-offset:2px;
  z-index:100 !important;pointer-events:auto !important;cursor:grab !important;
}
#avatar-wrap img.av-layer-selected:active{cursor:grabbing !important;}
</style>
</head>
<body>
<div id="app">

  <!-- ① SCENE -->
  <div id="scene">
    <div id="room-bg"></div>
  <button id="dev-unlock-btn" onclick="devUnlockAll()" title="테스트용: 모든 아이템 잠금 해제">🔓 전체 해제</button>
    <div id="furniture-layer"></div>

    <!-- Avatar layers -->
    <div id="avatar-wrap">
      <img id="av-body"  src="" alt="" style="pointer-events:none;" draggable="false">
      <!-- A3 FIX: 하체 마스크 - bottom 착용 시 바디 치마 가리기 -->
      <div id="av-body-mask" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);
        width:55%;height:42%;background:transparent;display:none;z-index:2;pointer-events:none"></div>
      <img id="av-hair"  src="" alt="" style="opacity:0" draggable="false">
      <img id="av-top"   src="" alt="" style="opacity:0" draggable="false">
      <img id="av-bot"   src="" alt="" style="opacity:0" draggable="false">
      <img id="av-acc"   src="" alt="" style="opacity:0" draggable="false">
      <img id="av-patch"  src="" alt="" style="opacity:0" draggable="false">
      <!-- av-couple-av removed -->
    </div>

    <!-- Pet -->
    <div id="pet-wrap" style="display:none">
      <img id="pet-body" src="" alt="">
      <!-- couple-on-pet removed -->
    </div>

    <div id="coin-hud">💰 <span id="coin-count">0</span></div>
    <div id="lv-hud">Lv.<span id="lv-num">1</span></div>
    <div id="scene-msg"></div>
  </div>

  <!-- ② LAYER CONTROL BAR (씬 외부, 탭 위에 위치) -->
  <div id="layer-ctrl-bar">
    <button id="layer-edit-btn" onclick="toggleLayerEdit()">📐 위치와 사이즈 조정</button>
    <button id="layer-reset-btn" onclick="resetAllLayers()">↩️ 초기화</button>
    <div id="layer-slot-panel"></div>
    <div id="layer-scale-hint">🖱️ 스크롤=크기 | 📱 두손가락=핀치</div>
  </div>

  <!-- ③ TAB BAR -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="avatar" onclick="setTab('avatar')">
      <span class="ti">👤</span><span>아바타</span>
    </button>
    <button class="tab-btn" data-tab="room" onclick="setTab('room')">
      <span class="ti">🏠</span><span>방꾸미기</span>
    </button>
    <button class="tab-btn" data-tab="pet" onclick="setTab('pet')">
      <span class="ti">🐾</span><span>펫</span>
    </button>
    <button class="tab-btn" data-tab="couple" onclick="setTab('couple')">
      <span class="ti">🎨</span><span>디자인패치</span>
    </button>
    <button class="tab-btn" data-tab="shop" onclick="setTab('shop')">
      <span class="ti">🛒</span><span>상점</span>
    </button>
  </div>

  <!-- ④ PANEL -->
  <div id="panel"></div>

</div><!-- /app -->

<!-- Buy Confirm Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="m-title">아이템 구매</h3>
    <img id="m-img" class="mimg" src="" alt="">
    <p id="m-desc"></p>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">취소</button>
      <button class="mbtn mbtn-buy" id="m-buybtn" onclick="confirmBuy()">구매하기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'INIT') {
    if (d.coins  !== undefined) S.coins  = d.coins;
    if (d.lv     !== undefined) S.lv     = d.lv;
    if (d.equipped)  Object.assign(S.equipped, d.equipped);
    if (d.roomBg)    S.roomBg = d.roomBg;
    if (d.furniture) S.furniture = d.furniture || [];
    if (d.layerAdjust) S.layerAdjust = d.layerAdjust || {};
    if (d.avatarPos)   Object.assign(S.avatarPos, d.avatarPos);
    if (d.petPos)      Object.assign(S.petPos,    d.petPos);
    if (d.petScale !== undefined) S.petScale = d.petScale;
    if (d.unlocked) {
      for (const k in d.unlocked) {
        if (S.unlocked[k]) S.unlocked[k] = d.unlocked[k];
      }
    }
    if (d.curAvatar) S.curAvatar = d.curAvatar;
    saveLocal();
    renderAll();
    showToast('💫 데이터 로드 완료!');
  }

  if (d.type === 'COINS_UPDATE') {
    S.coins = d.coins;
    updateHUD();
  }
});

function sendToParent(msg) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(msg, '*');
  }
}

// ============================================================
// ⑤ 로컬 저장/로드 (standalone 모드 fallback)
// ============================================================
function saveLocal() {
  try { localStorage.setItem('avatarRoomState', JSON.stringify(S)); } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('avatarRoomState');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.assign(S, saved);
      // ✅ roomBg 유효성 검증: 잘못된 값이면 'day'로 복구
      const validRoomIds = ROOM_BG.map(r => r.id);
      if (!validRoomIds.includes(S.roomBg)) { S.roomBg = 'day'; }
      // ✅ couple 장착 항목 초기화 (커플템 탭 제거로 인한 잔여 상태)
      if (S.equipped) { S.equipped.couple = null; }
    }
  } catch(e) { localStorage.removeItem('avatarRoomState'); }
}

function updateHUD() {
  document.getElementById('coin-count').textContent = S.coins.toLocaleString();
  document.getElementById('lv-num').textContent = S.lv;
}

function getAvatarFile(id, expr) {
  const av = AVATARS.find(a => a.id === id);
  if (!av) return '';
  if (expr === 'happy') return av.happyFile;
  if (expr === 'tired') return av.tiredFile;
  return av.file;
}

function updateScene() {
  // Room background
  const _validRoomBg = ROOM_BG.find(r => r.id === S.roomBg);
  const bgItem = _validRoomBg || ROOM_BG.find(r => r.id === 'day') || ROOM_BG[0];
  if (!_validRoomBg) { S.roomBg = bgItem.id; }  // 잘못된 상태 자동 복구
  const bgEl = document.getElementById('room-bg');
  bgEl.style.backgroundImage = `url('${assetUrl(bgItem.file)}')`;
  bgEl.style.backgroundSize = 'cover';

  // Avatar body
  const bodyUrl = assetUrl(getAvatarFile(S.curAvatar, S.curExpr));
  setImgSrc('av-body', bodyUrl);

  // Hair
  setEquippedLayer('av-hair',   S.equipped.hair,   HAIR_ITEMS);
  setEquippedLayer('av-top',    S.equipped.top,     TOP_ITEMS);
  setEquippedLayer('av-bot',    S.equipped.bottom,  BOTTOM_ITEMS);
  // A3: clip-path 제거 (팔/발 잘림 버그 원인)
  // 실제 v8 child 이미지는 하체 치마가 없으므로 clip 불필요
  const avBody = document.getElementById('av-body');
  if (avBody) avBody.style.clipPath = '';
  setEquippedLayer('av-acc',    S.equipped.acc,     ACC_ITEMS);
  setEquippedLayer('av-patch',  S.equipped.patch,  PATCH_ITEMS);

  // Couple item on avatar
  // couple layer removed

  // 아바타 위치 복원
  const avWrap = document.getElementById('avatar-wrap');
  if (S.avatarPos.x !== null) {
    avWrap.style.left   = S.avatarPos.x + 'px';
    avWrap.style.bottom = S.avatarPos.y + 'px';
    avWrap.style.transform = 'none';
  } else {
    avWrap.style.left = '50%'; avWrap.style.bottom = '10%';
    avWrap.style.transform = 'translateX(-50%)';
  }

  // Pet
  const petWrap = document.getElementById('pet-wrap');
  if (S.equipped.pet) {
    const petItem = PET_ITEMS.find(p => p.id === S.equipped.pet);
    if (petItem) {
      setImgSrc('pet-body', assetUrl(petItem.file));
      petWrap.style.display = 'block';
      // 펫 크기 적용
      const petBase = 56;
      const petSz = Math.round(petBase * (S.petScale || 1));
      petWrap.style.width  = petSz + 'px';
      petWrap.style.height = petSz + 'px';
      // 펫 위치 복원
      if (S.petPos.x !== null) {
        petWrap.style.left   = S.petPos.x + 'px';
        petWrap.style.bottom = S.petPos.y + 'px';
      } else {
        petWrap.style.left = 'calc(50% + 65px)';
        petWrap.style.bottom = '10%';
      }
      // Couple item on pet
      // couple-on-pet layer removed
    }
  } else {
    petWrap.style.display = 'none';
  }

  // Furniture
  renderFurnitureLayer();
}

function setImgSrc(id, src) {
  const el = document.getElementById(id);
  if (!el) return;
  el.src = src;
  el.style.opacity = '1';
  el.onerror = () => { el.style.opacity = '0'; };
}

function setEquippedLayer(elId, equippedId, items) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!equippedId) {
    el.style.opacity = '0'; el.src = '';
    el.style.transform = ''; el.style.pointerEvents = 'none';
    el.classList.remove('av-layer-active');
    return;
  }
  const item = items.find(i => i.id === equippedId);
  if (!item) { el.style.opacity = '0'; return; }

  // A2 FIX: patch2는 file이 없고 canvas로 생성
  if (elId === 'av-patch2') {
    el.src = makePatch2Canvas(item);
    el.style.opacity = '1';
    if (!layerEditMode) el.style.pointerEvents = 'none';
    applyLayerTransform(el, equippedId);
    return;
  }

  el.src = assetUrl(item.file);
  el.style.opacity = '1';
  if (!layerEditMode) el.style.pointerEvents = 'none';
  el.onerror = () => { el.style.opacity = '0'; };
  applyLayerTransform(el, equippedId);
}

function renderFurnitureLayer() {
  // draggingEl 가드 제거 → scale 변경 후 즉시 반영 가능
  const layer = document.getElementById('furniture-layer');
  layer.innerHTML = '';
  S.furniture.forEach((f, idx) => {
    const fItem = FURNITURE.find(fi => fi.id === f.id);
    if (!fItem) return;
    const scale = f.scale || 1;
    const baseSize = 96;
    const size = Math.round(baseSize * scale);
    const el = document.createElement('img');
    el.className = 'furniture-item';
    el.src = assetUrl(fItem.file);
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = f.x + 'px';
    el.style.bottom = f.y + 'px';
    el.title = fItem.label + (scale !== 1 ? ` (${Math.round(scale*100)}%)` : '');
    el.dataset.idx = idx;
    // 마우스 드래그 (왼쪽 버튼 = 이동, 기본)
    el.addEventListener('mousedown',  (e) => startFurnDrag(e, el, idx));
    // 터치 (1손가락=이동, 2손가락=핀치줌)
    el.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      startFurnDragTouch(e, el, idx);
    }, {passive:false});
    // 편집 모드에서 선택된 가구 강조
    if (layerEditMode && activeLayerSlot === 'furn-' + idx) {
      el.style.outline = '2px dashed #ffe066';
      el.style.outlineOffset = '2px';
      el.style.zIndex = '30';
    }
    // 마우스 휠 = 크기 조절
    el.addEventListener('wheel', (e) => {
      e.preventDefault();
      const cur = S.furniture[idx].scale || 1;
      // deltaY 민감도: 스크롤 방향 정규화
      const delta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
      S.furniture[idx].scale = Math.max(0.3, Math.min(4.0, cur - delta * 0.01));
      const ns = Math.round(96 * S.furniture[idx].scale);
      el.style.width = ns + 'px'; el.style.height = ns + 'px';
      el.title = fItem.label + ` (${Math.round(S.furniture[idx].scale*100)}%)`;
      saveLocal(); sendRoomUpdate();
    }, {passive:false});
    // 더블클릭/더블탭 = 제거
    el.addEventListener('dblclick', (ev) => {
      ev.stopPropagation();
      removeFurniture(idx);
    });
    // 단일 클릭 = 제거 (확인용 토스트 + 1초 내 재클릭 시 제거)
    let _clickTimer = null;
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (el._suppressClick) { el._suppressClick = false; return; }  // 드래그 후 click 무시
      if (el.classList.contains('furn-selected')) {
        // 이미 선택 중 → 제거
        if (_clickTimer) clearTimeout(_clickTimer);
        _clickTimer = null;
        el.classList.remove('furn-selected');
        hideFurnRemoveBtn();
        removeFurniture(idx);
        return;
      }
      // 첫 클릭 → 선택 표시
      document.querySelectorAll('.furniture-item.furn-selected').forEach(e2 => e2.classList.remove('furn-selected'));
      hideFurnRemoveBtn();
      el.classList.add('furn-selected');
      showFurnRemoveBtn(el, idx);
      // 3초 후 자동 선택 해제
      _clickTimer = setTimeout(() => {
        el.classList.remove('furn-selected');
        hideFurnRemoveBtn();
        _clickTimer = null;
      }, 3000);
    });
    // 모바일 더블탭 지원
    let _lastTap = 0;
    el.addEventListener('touchend', (ev) => {
      const now = Date.now();
      if (now - _lastTap < 350) {
        ev.preventDefault();
        ev.stopPropagation();
        removeFurniture(idx);
        hideFurnRemoveBtn();
      }
      _lastTap = now;
    });
    layer.appendChild(el);
  });
}

function setTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  // ✅ 탭에 따라 레이어 편집 바 표시/숨김
  const editBtn  = document.getElementById('layer-edit-btn');
  const ctrlBar2 = document.getElementById('layer-ctrl-bar');
  if (editBtn && !layerEditMode) {
    if (tab === 'shop') {
      if (ctrlBar2) ctrlBar2.style.display = 'none';
    } else {
      editBtn.textContent = '📐 위치와 사이즈 조정';
      editBtn.style.display = '';
      if (ctrlBar2) ctrlBar2.style.display = '';
    }
  }
  // 레이어 편집 모드라면 강제 종료
  if (layerEditMode) {
    layerEditMode = false;
    const scene = document.getElementById('scene');
    const ctrlBar = document.getElementById('layer-ctrl-bar');
    const editBtn = document.getElementById('layer-edit-btn');
    const resetBtn = document.getElementById('layer-reset-btn');
    if (scene) scene.classList.remove('layer-edit-mode');
    if (ctrlBar) ctrlBar.classList.remove('edit-mode');
    if (editBtn) { editBtn.textContent = '📐 위치와 사이즈 조정'; editBtn.style.background = ''; }
    if (resetBtn) resetBtn.style.display = 'none';
    activeLayerSlot = null;
    _clearLayerSelection();
    disableLayerDrag();
  }
  // 펫 크기 조절 모드라면 종료 (다른 탭으로 이동 시)
  if (petSizeMode && tab !== 'pet') { togglePetSizeMode(); }
  renderPanel();
}

function renderPanel() {
  const p = document.getElementById('panel');
  p.innerHTML = '';

  switch(curTab) {
    case 'avatar': renderAvatarPanel(p); break;
    case 'room':   renderRoomPanel(p);   break;
    case 'pet':    renderPetPanel(p);    break;
    case 'couple': renderCouplePanel(p); break;
    case 'shop':   renderShopPanel(p);   break;
  }
}

// ---- Avatar Panel ----
function renderAvatarPanel(p) {
  // Avatar type selector
  addSecHead(p, '캐릭터 선택');
  const avSel = document.createElement('div');
  avSel.className = 'avatar-selector';
  AVATARS.forEach(av => {
    const opt = document.createElement('div');
    opt.className = 'avatar-option' + (S.curAvatar === av.id ? ' selected' : '');
    opt.innerHTML = `<img src="${assetUrl(av.file)}" alt="${av.label}"><span>${av.label}</span>`;
    opt.onclick = () => {
      S.curAvatar = av.id;
      saveLocal();
      sendEquip();
      updateScene();
      renderPanel();
    };
    avSel.appendChild(opt);
  });
  p.appendChild(avSel);


  // Hair
  addSecHead(p, '헤어 & 모자');
  renderItemGrid(p, HAIR_ITEMS, S.unlocked.hair, S.equipped.hair, (id) => onEquip('hair', id, HAIR_ITEMS));

function renderRoomPanel(p) {
  addSecHead(p, '방 배경');
  renderItemGrid(p, ROOM_BG, S.unlocked.room, S.roomBg, (id) => {
    S.roomBg = id;
    saveLocal();
    sendRoomUpdate();
    updateScene();
  }, true);

  addSecHead(p, '🪑 가구와 소품 꾸미기 (드래그하여 방에 놓기)');
  const hint = document.createElement('div');
  hint.id = 'place-hint';
  hint.textContent = '💡 클릭=배치(재클릭=제거) | 방에서 드래그=이동 | 🖱️스크롤·📱두손가락=크기';
  p.appendChild(hint);

  const tray = document.createElement('div');
  tray.id = 'furniture-tray';
  tray.className = 'furniture-tray';

  FURNITURE.forEach(fi => {
    const owned = S.unlocked.furniture.includes(fi.id);
    const placed = S.furniture.filter(f => f.id === fi.id).length;

    const card = document.createElement('div');
    card.className = 'furn-tray-item' + (owned ? '' : ' locked');
    card.style.opacity = owned ? '1' : '.45';

    if (placed > 0) {
      const cnt = document.createElement('span');
      cnt.className = 'fcount';
      cnt.textContent = '×' + placed;
      card.appendChild(cnt);
    }

    const img = document.createElement('img');
    img.src = assetUrl(fi.file);
    img.alt = fi.label;
    card.appendChild(img);
    // 이름 레이블
    const nameEl = document.createElement('span');
    nameEl.className = 'fname';
    nameEl.textContent = fi.label;
    card.appendChild(nameEl);
    // 배치 상태 강조
    const isPlaced = S.furniture.some(f => f.id === fi.id);
    if (isPlaced) card.classList.add('placed');

    if (owned) {
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        draggingFurn = fi.id;
        e.dataTransfer.effectAllowed = 'copy';
      });
      // ✅ 클릭 = 배치/제거 토글 (펫과 동일한 방식)
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        const alreadyIdx = S.furniture.findIndex(f => f.id === fi.id);
        if (alreadyIdx !== -1) {
          // 이미 배치됨 → 제거
          S.furniture.splice(alreadyIdx, 1);
          saveLocal(); sendRoomUpdate(); renderFurnitureLayer(); renderPanel();
          showToast('🗑 ' + fi.label + ' 제거됨');
        } else {
          // 배치
          const scene = document.getElementById('scene');
          const rect = scene.getBoundingClientRect();
          const itemSize = 96;
          const x = Math.round((rect.width  - itemSize) / 2);
          const y = Math.round((rect.height - itemSize) / 2);
          S.furniture.push({ id: fi.id, x, y, scale: 1 });
          saveLocal(); sendRoomUpdate(); renderFurnitureLayer(); renderPanel();
          showToast('🪑 ' + fi.label + ' 배치! 방에서 드래그=이동, 스크롤=크기');
        }
      });
      // 터치 드래그: 트레이 → 씬으로 이동
      let _touchDragActive = false;
      card.addEventListener('touchstart', (e) => {
        draggingFurn = fi.id;
        _touchDragActive = true;
      }, {passive:true});
      card.addEventListener('touchend', (e) => {
        if (!_touchDragActive || !draggingFurn) return;
        _touchDragActive = false;
        const t = e.changedTouches[0];
        const scene = document.getElementById('scene');
        const rect = scene.getBoundingClientRect();
        // 터치가 씬 위에서 끝났는지 확인
        if (t.clientX >= rect.left && t.clientX <= rect.right &&
            t.clientY >= rect.top  && t.clientY <= rect.bottom) {
          const x = Math.max(0, Math.min(t.clientX - rect.left - 48, rect.width - 96));
          const y = Math.max(0, rect.bottom - t.clientY - 48);
          S.furniture.push({ id: draggingFurn, x: Math.round(x), y: Math.round(y), scale: 1 });
          draggingFurn = null;
          saveLocal();
          sendRoomUpdate();
          renderFurnitureLayer();
          renderPanel();
          showToast('🪑 가구를 배치했어요!');
        } else {
          draggingFurn = null;
        }
      }, {passive:true});
    } else {
      card.title = `🔒 ${fi.label} - ${fi.price} 코인 (상점에서 구매)`;
      card.onclick = () => showToast(`🔒 ${fi.label}은 상점에서 구매 후 배치 가능해요`);
    }
    tray.appendChild(card);
  });

  // Drop target on scene (renderRoomPanel 호출 시마다 재설정 방지)
  initSceneDrop();

  p.appendChild(tray);
}

function initSceneDrop() {
  const scene = document.getElementById('scene');
  if (scene._dropInited) return;  // 이미 초기화됨
  scene._dropInited = true;
  // 씬 빈 곳 클릭 시 가구 선택 해제
  scene.addEventListener('click', (e) => {
    if (e.target === scene || e.target.id === 'room-bg' || e.target.id === 'furniture-layer') {
      document.querySelectorAll('.furniture-item.furn-selected').forEach(el => el.classList.remove('furn-selected'));
      hideFurnRemoveBtn();
    }
  });
  scene.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  scene.ondrop = (e) => {
    e.preventDefault();
    if (!draggingFurn) return;
    const rect = scene.getBoundingClientRect();
    const x = Math.max(0, Math.min(e.clientX - rect.left - 24, rect.width - 48));
    const y = Math.max(0, rect.bottom - e.clientY - 24);
    S.furniture.push({ id: draggingFurn, x: Math.round(x), y: Math.round(y), scale: 1 });
    draggingFurn = null;
    saveLocal();
    sendRoomUpdate();
    renderFurnitureLayer();
  };
}

// ---- Patch2 아이템 그리드 렌더링 (텍스트 기반 canvas 패치) ----
function makePatch2Canvas(item) {
  const c = document.createElement('canvas');
  c.width = 80; c.height = 80;
  const ctx = c.getContext('2d');
  ctx.fillStyle = item.bg || '#e3f2fd';
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(2, 2, 76, 76, 14);
  } else {
    ctx.rect(2, 2, 76, 76);
  }
  ctx.fill();
  ctx.strokeStyle = item.color || '#1565c0';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  const txt = item.text || item.label || '?';
  const fontSize = txt.length > 4 ? 16 : txt.length > 2 ? 20 : 28;
  ctx.fillStyle = item.color || '#1565c0';
  ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, 40, 40);
  return c.toDataURL('image/png');
}

function renderPatch2Grid(p) {

function addSecHead(parent, text) {

function renderItemGrid(parent, items, unlockedArr, equippedId, onClickCb, isRoom=false, shopMode=false, gridClass='') {
  const grid = document.createElement('div');
  grid.className = 'item-grid' + (gridClass ? ' ' + gridClass : '');

  items.forEach(item => {
    const owned   = unlockedArr.includes(item.id);
    const isEquip = (equippedId === item.id);
    const free    = item.price === 0;

    const card = document.createElement('div');
    card.className = 'item-card';
    if (isEquip) card.classList.add('equipped');
    if (!owned && !shopMode) card.classList.add('locked');
    if (free && !owned && !shopMode) card.classList.add('free-badge');

    const img = document.createElement('img');
    setIconSrc(img, item.file);
    img.alt = item.label;
    img.onerror = () => {
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'width:48px;height:48px;background:#e8d8f8;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;';
      // 아이템 종류별 폴백 이모지
      const fallbackEmoji = {
        p01:'⭐', p02:'❤️', p03:'🌸', p04:'🌈', p05:'🐱', p06:'🐶', p07:'⚡', p08:'🎵', p09:'🦋', p10:'🍦',
        p_gecko:'🦎', p_hamster:'🐹',
        p0:'🐶', p1:'🐢', p2:'🐟', p3:'🐍', p4:'🐿️', p6:'🐺', p7:'🦂', p8:'🦔',
        h0:'💇', a1:'👜',
      };
      ph.textContent = fallbackEmoji[item.id] || '🎨';
      card.insertBefore(ph, card.firstChild);
    };
    card.appendChild(img);

    const name = document.createElement('span');
    name.className = 'iname';
    name.textContent = item.label;
    card.appendChild(name);

    if (!owned || shopMode) {
      if (item.price > 0) {
        const priceEl = document.createElement('span');
        priceEl.className = 'iprice';
        priceEl.textContent = `💰${item.price}`;
        card.appendChild(priceEl);
      }
      if (!owned && !shopMode && !free) {
        const lock = document.createElement('span');
        lock.className = 'lock-icon';
        lock.textContent = '🔒';
        card.appendChild(lock);
      }
    }

    if (isEquip) {
      const check = document.createElement('span');
      check.style.cssText = 'position:absolute;top:2px;right:2px;font-size:12px;';
      check.textContent = '✅';
      card.appendChild(check);
    }

    card.onclick = () => {
      if (!owned && !shopMode) {
        if (free) {
          // Auto-unlock free items
          S.unlocked[getCategoryKey(item, items)].push(item.id);
          saveLocal();
          onClickCb(item.id);
          renderPanel();
        } else {
          showBuyModal(item, getCategoryKey(item, items));
        }
      } else {
        onClickCb(item.id);
        renderPanel();
      }
    };
    grid.appendChild(card);
  });
  parent.appendChild(grid);
}

function getCategoryKey(item, items) {
  if (HAIR_ITEMS.includes(item))    return 'hair';
  if (TOP_ITEMS.includes(item))     return 'top';
  if (BOTTOM_ITEMS.includes(item))  return 'bottom';
  if (ACC_ITEMS.includes(item))     return 'acc';
  if (ROOM_BG.includes(item))       return 'room';
  if (FURNITURE.includes(item))     return 'furniture';
  if (PET_ITEMS.includes(item))     return 'pet';
  if (COUPLE_ITEMS.includes(item))  return 'couple';
  return 'misc';
}

// ============================================================
// ⑧ 구매 시스템
// ============================================================
function showBuyModal(item, categoryKey) {
  pendingBuy = { item, categoryKey };
  document.getElementById('m-title').textContent = '아이템 구매';
  document.getElementById('m-img').src = iconUrl(item.file);
  document.getElementById('m-img').onerror = () => { document.getElementById('m-img').style.display='none'; };
  document.getElementById('m-desc').innerHTML =
    `<strong>${item.label}</strong><br>💰 ${item.price} 코인<br><small>현재 보유: ${S.coins.toLocaleString()} 코인</small>`;
  const buyBtn = document.getElementById('m-buybtn');
  buyBtn.disabled = S.coins < item.price;
  buyBtn.textContent = S.coins < item.price ? '코인 부족 😢' : '구매하기 💰';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  pendingBuy = null;
}

function confirmBuy() {
  if (!pendingBuy) return;
  const { item, categoryKey } = pendingBuy;
  if (S.coins < item.price) { showToast('💸 코인이 부족해요!'); return; }

  S.coins -= item.price;
  if (!S.unlocked[categoryKey]) S.unlocked[categoryKey] = [];
  S.unlocked[categoryKey].push(item.id);

  saveLocal();
  closeModal();
  showToast(`✨ ${item.label} 구매 완료!`);

  // Send to parent
  sendToParent({
    type: 'PURCHASE',
    cost: item.price,
    itemId: item.id,
    category: categoryKey,
    coins: S.coins,
    unlocked: S.unlocked,
  });

  renderAll();
}

// ============================================================
// ⑨ 착용 / 방 업데이트 → 부모에 전송
// ============================================================
function onEquip(slot, id, items) {
  const owned = S.unlocked[slot] && S.unlocked[slot].includes(id);
  if (!owned) {
    const item = items.find(i => i.id === id);
    if (item) showBuyModal(item, slot);
    return;
  }
  // 레이어 편집 모드 중이면 먼저 종료 (이벤트 핸들러 충돌 방지)
  if (layerEditMode) {
    layerEditMode = false;
    const scene   = document.getElementById('scene');
    const ctrlBar = document.getElementById('layer-ctrl-bar');
    scene.classList.remove('layer-edit-mode');
    if (ctrlBar) ctrlBar.classList.remove('edit-mode');
    disableLayerDrag();
    const editBtn  = document.getElementById('layer-edit-btn');
    const resetBtn = document.getElementById('layer-reset-btn');
    if (editBtn)  { editBtn.textContent = '📐 위치와 사이즈 조정'; editBtn.style.background = ''; }
    if (resetBtn) { resetBtn.style.display = 'none'; }
  }
  S.equipped[slot] = (S.equipped[slot] === id) ? null : id;
  saveLocal();
  sendEquip();
  updateScene();
  renderPanel();
}

function sendEquip() {
  sendToParent({
    type: 'EQUIP',

// ============================================================
// ⑩ 가구 드래그 (씬 내에서 이동)
// ============================================================
function startFurnDrag(e, el, idx) {
  e.preventDefault();
  draggingEl = { el, idx };
  let _hasMoved = false;   // 실제 이동 여부 추적
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  const scale = S.furniture[idx].scale || 1;
  const half = Math.round(48 * scale);   // baseSize 96 기준 절반

  function onMove(ev) {
    _hasMoved = true;
    const maxW = sceneRect.width - half * 2;
    const x = Math.max(0, Math.min(ev.clientX - sceneRect.left - half, maxW));
    const y = Math.max(0, sceneRect.bottom - ev.clientY - half);
    el.style.left = x + 'px';
    el.style.bottom = y + 'px';
    S.furniture[idx].x = Math.round(x);
    S.furniture[idx].y = Math.round(y);
  }
  function onUp() {
    draggingEl = null;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    if (_hasMoved) {
      // 이동 발생 → click 이벤트 1회 취소
      el._suppressClick = true;
      setTimeout(() => { el._suppressClick = false; }, 50);
      el.classList.remove('furn-selected');
      hideFurnRemoveBtn();
      saveLocal(); sendRoomUpdate(); renderFurnitureLayer();
    }
    // 이동 없으면 click 이벤트가 발생하여 선택/제거 처리
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function startFurnDragTouch(e, el, idx) {
  e.preventDefault();
  draggingEl = { el, idx };
  el.classList.add('furn-selected');
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  const baseSize = 96;

  // 공통 정리 함수
  function cleanup(moveFn, endFn) {
    window.removeEventListener('touchmove', moveFn);
    window.removeEventListener('touchend', endFn);
    window.removeEventListener('touchstart', onSecondFinger);
  }
  function done() {
    draggingEl = null;
    el.classList.remove('furn-selected');
    saveLocal(); sendRoomUpdate(); renderFurnitureLayer();
  }

  // ── 핀치 줌 시작 ──
  function startPinch(touches) {
    const d0 = Math.hypot(
      touches[0].clientX - touches[1].clientX,
      touches[0].clientY - touches[1].clientY
    );
    const s0 = S.furniture[idx].scale || 1;
    function onPinchMove(ev) {
      ev.preventDefault();
      if (ev.touches.length < 2) return;
      const d = Math.hypot(
        ev.touches[0].clientX - ev.touches[1].clientX,
        ev.touches[0].clientY - ev.touches[1].clientY
      );
      const ns = Math.max(0.3, Math.min(4.0, s0 * d / d0));
      S.furniture[idx].scale = ns;
      const px = Math.round(baseSize * ns);
      el.style.width  = px + 'px';
      el.style.height = px + 'px';
    }
    function onPinchEnd() {
      cleanup(onPinchMove, onPinchEnd);
      done();
    }
    window.addEventListener('touchmove', onPinchMove, {passive:false});
    window.addEventListener('touchend', onPinchEnd);
  }

  if (e.touches.length >= 2) {
    // 처음부터 2손가락
    startPinch(e.touches);
    return;
  }

  // ── 1손가락: 위치 이동 ──
  const scale = S.furniture[idx].scale || 1;
  const half  = Math.round((baseSize * scale) / 2);
  const t0    = e.touches[0];
  // DOM 실제 위치 기반 오프셋
  const elRect = el.getBoundingClientRect();
  const offX = t0.clientX - elRect.left;
  const offY = t0.clientY - elRect.top;

  function onDragMove(ev) {
    ev.preventDefault();
    if (ev.touches.length === 0) return;
    const t = ev.touches[0];
    const maxW = sceneRect.width - half * 2;
    const x = Math.max(0, Math.min(t.clientX - sceneRect.left - offX, maxW));
    const y = Math.max(0, sceneRect.bottom - t.clientY - (half * 2 - offY));
    el.style.left   = x + 'px';
    el.style.bottom = y + 'px';
    S.furniture[idx].x = Math.round(x);
    S.furniture[idx].y = Math.round(y);
  }
  function onDragEnd() {
    cleanup(onDragMove, onDragEnd);
    done();
  }
  // 드래그 중 두 번째 손가락 추가 시 핀치로 전환
  function onSecondFinger(ev) {
    if (ev.touches.length >= 2) {
      window.removeEventListener('touchmove', onDragMove);
      window.removeEventListener('touchend', onDragEnd);
      window.removeEventListener('touchstart', onSecondFinger);
      startPinch(ev.touches);
    }
  }
  window.addEventListener('touchmove', onDragMove, {passive:false});
  window.addEventListener('touchend', onDragEnd);
  window.addEventListener('touchstart', onSecondFinger, {passive:false});
}

// ── 가구 제거 버튼 표시/숨김 ──
function showFurnRemoveBtn(el, idx) {

// ============================================================
// ⑭ 아바타 & 펫 위치 드래그 (씬 내 자유 이동 + 저장)
// ============================================================
function initAvatarPetDrag() {
  const scene = document.getElementById('scene');

  function makeDraggable(wrap, posKey) {
    // ── 마우스: getBoundingClientRect 기반 오프셋 (점프 없음) ──
    wrap.addEventListener('mousedown', (e) => {
      if (layerEditMode) return;
      e.preventDefault(); e.stopPropagation();
      const sceneRect = scene.getBoundingClientRect();
      const wrapRect  = wrap.getBoundingClientRect();
      const w = wrap.offsetWidth, h = wrap.offsetHeight;
      // 클릭 지점과 wrap 좌상단의 오프셋 (DOM 실제 위치 기준)
      // transform 제거 전에 픽셀값으로 고정 (translateX(-50%) 점프 방지)
      wrap.style.left   = (wrapRect.left - sceneRect.left) + 'px';
      wrap.style.bottom = (sceneRect.bottom - wrapRect.bottom) + 'px';
      wrap.style.transform = 'none';
      const offX = e.clientX - wrapRect.left;
      const offY = e.clientY - wrapRect.top;
      function onMove(ev) {
        const x = Math.max(0, Math.min(ev.clientX - sceneRect.left - offX, sceneRect.width - w));
        const y = Math.max(0, Math.min(sceneRect.bottom - ev.clientY - (h - offY), sceneRect.height - h));
        wrap.style.left   = x + 'px';
        wrap.style.bottom = y + 'px';
        S[posKey].x = Math.round(x);
        S[posKey].y = Math.round(y);
      }
      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        saveLocal();
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // ── 터치: getBoundingClientRect 기반 오프셋 + passive:false ──
    wrap.addEventListener('touchstart', (e) => {
      if (layerEditMode) return;
      if (e.touches.length !== 1) return;
      e.preventDefault(); e.stopPropagation();
      const sceneRect = scene.getBoundingClientRect();
      const wrapRect  = wrap.getBoundingClientRect();
      const w = wrap.offsetWidth, h = wrap.offsetHeight;
      const t0 = e.touches[0];
      // 터치 지점과 wrap 좌상단의 오프셋 (DOM 실제 위치 기준)
      // transform 제거 전에 픽셀값으로 고정 (translateX(-50%) 점프 방지)
      wrap.style.left   = (wrapRect.left - sceneRect.left) + 'px';
      wrap.style.bottom = (sceneRect.bottom - wrapRect.bottom) + 'px';
      wrap.style.transform = 'none';
      const offX = t0.clientX - wrapRect.left;
      const offY = t0.clientY - wrapRect.top;
      function onMove(ev) {
        ev.preventDefault();
        if (ev.touches.length < 1) return;
        const t = ev.touches[0];
        const x = Math.max(0, Math.min(t.clientX - sceneRect.left - offX, sceneRect.width - w));
        const y = Math.max(0, Math.min(sceneRect.bottom - t.clientY - (h - offY), sceneRect.height - h));
        wrap.style.left   = x + 'px';
        wrap.style.bottom = y + 'px';
        S[posKey].x = Math.round(x);
        S[posKey].y = Math.round(y);
      }
      function onEnd() {
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onEnd);
        saveLocal();
      }
      window.addEventListener('touchmove', onMove, {passive:false});
      window.addEventListener('touchend', onEnd);
    }, {passive:false});
  }

  const avWrap  = document.getElementById('avatar-wrap');
  const petWrap = document.getElementById('pet-wrap');
  if (avWrap)  { avWrap.style.cursor  = 'grab'; makeDraggable(avWrap,  'avatarPos'); }
  if (petWrap) {
    petWrap.style.cursor = 'grab';

    // ── 펫 마우스 드래그 ──
    petWrap.addEventListener('mousedown', (e) => {
      if (layerEditMode) return;
      e.preventDefault(); e.stopPropagation();
      const sceneEl = document.getElementById('scene');
      const sceneRect = sceneEl.getBoundingClientRect();
      const wrapRect  = petWrap.getBoundingClientRect();
      const w = petWrap.offsetWidth, h = petWrap.offsetHeight;
      const offX = e.clientX - wrapRect.left;
      const offY = e.clientY - wrapRect.top;
      petWrap.style.transform = 'none';
      function onMove(ev) {
        const x = Math.max(0, Math.min(ev.clientX - sceneRect.left - offX, sceneRect.width - w));
        const y = Math.max(0, Math.min(sceneRect.bottom - ev.clientY - (h - offY), sceneRect.height - h));
        petWrap.style.left   = x + 'px';
        petWrap.style.bottom = y + 'px';
        S.petPos.x = Math.round(x);
        S.petPos.y = Math.round(y);
      }
      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        saveLocal();
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // ── 펫 마우스 휠 리사이즈 ──
    petWrap.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
      S.petScale = Math.max(0.3, Math.min(4.0, (S.petScale || 1) - delta * 0.01));
      const sz = Math.round(56 * S.petScale);
      petWrap.style.width  = sz + 'px';
      petWrap.style.height = sz + 'px';
      saveLocal();
    }, {passive:false});

    // ── 펫 터치: makeDraggable 과 동일한 안정적 패턴 (드래그 + 핀치줌 분리) ──
    // 1손가락: 위치 드래그
    petWrap.addEventListener('touchstart', (e) => {
      if (layerEditMode) return;
      if (e.touches.length !== 1) return;   // 1손가락 전용 (핀치는 아래 핸들러)
      e.preventDefault(); e.stopPropagation();
      const sceneEl   = document.getElementById('scene');
      const sceneRect = sceneEl.getBoundingClientRect();
      const wrapRect  = petWrap.getBoundingClientRect();
      const w = petWrap.offsetWidth, h = petWrap.offsetHeight;
      const t0 = e.touches[0];
      const offX = t0.clientX - wrapRect.left;
      const offY = t0.clientY - wrapRect.top;
      // calc() / transform 을 픽셀로 고정
      petWrap.style.left   = (wrapRect.left - sceneRect.left) + 'px';
      petWrap.style.bottom = (sceneRect.bottom - wrapRect.bottom) + 'px';
      function onMove(ev) {
        ev.preventDefault();
        if (ev.touches.length < 1) return;
        const t = ev.touches[0];
        const x = Math.max(0, Math.min(t.clientX - sceneRect.left - offX, sceneRect.width - w));
        const y = Math.max(0, Math.min(sceneRect.bottom - t.clientY - (h - offY), sceneRect.height - h));
        petWrap.style.left   = x + 'px';
        petWrap.style.bottom = y + 'px';
        S.petPos.x = Math.round(x);
        S.petPos.y = Math.round(y);
      }
      function onEnd() {
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onEnd);
        saveLocal();
      }
      window.addEventListener('touchmove', onMove, {passive:false});
      window.addEventListener('touchend', onEnd);
    }, {passive:false});

    // 2손가락: 핀치줌 리사이즈 (별도 핸들러로 분리)
    petWrap.addEventListener('touchstart', (e) => {
      if (layerEditMode) return;
      if (e.touches.length < 2) return;   // 2손가락 전용
      e.preventDefault(); e.stopPropagation();
      const d0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const s0 = S.petScale || 1;
      function onPinchMove(ev) {
        ev.preventDefault();
        if (ev.touches.length < 2) return;
        const d = Math.hypot(
          ev.touches[0].clientX - ev.touches[1].clientX,
          ev.touches[0].clientY - ev.touches[1].clientY
        );
        S.petScale = Math.max(0.3, Math.min(4.0, s0 * d / d0));
        const sz = Math.round(56 * S.petScale);
        petWrap.style.width  = sz + 'px';
        petWrap.style.height = sz + 'px';
      }
      function onPinchEnd() {
        window.removeEventListener('touchmove', onPinchMove);
        window.removeEventListener('touchend', onPinchEnd);
        saveLocal();
      }
      window.addEventListener('touchmove', onPinchMove, {passive:false});
      window.addEventListener('touchend', onPinchEnd);
    }, {passive:false});
  }
}

function autoUnlockFreeItems() {
  const allCategories = [
    { key:'hair',     items: HAIR_ITEMS    },
    { key:'top',      items: TOP_ITEMS     },
    { key:'bottom',   items: BOTTOM_ITEMS  },
    { key:'acc',      items: ACC_ITEMS     },
    { key:'patch',    items: PATCH_ITEMS   },
    { key:'patch2',   items: PATCH2_ITEMS  },
    { key:'room',     items: ROOM_BG       },
    { key:'furniture',items: FURNITURE     },
    { key:'pet',      items: PET_ITEMS     },
    { key:'couple',   items: COUPLE_ITEMS  },
  ];
  allCategories.forEach(cat => {
    cat.items.filter(i => i.price === 0).forEach(i => {
      if (!S.unlocked[cat.key].includes(i.id)) {
        S.unlocked[cat.key].push(i.id);
      }
    });
  });
}

      if (petWrap) { petWrap.style.outline = ''; petWrap.style.outlineOffset = ''; }
      saveLocal();
    }
  }
}

// 동적 슬롯 패널 생성 (탭·장착 상태·배치 가구에 따라)
function _buildDynamicSlotPanel() {
  const panel = document.getElementById('layer-slot-panel');
  if (!panel) return;
  panel.innerHTML = '';  // 초기화

  function makeBtn(id, label, onclick) {
    const btn = document.createElement('button');
    btn.className = 'layer-slot-btn';
    btn.id = 'slot-btn-' + id;
    btn.textContent = label;
    btn.onclick = onclick;
    panel.appendChild(btn);
  }

  // ── 아바타 위치 버튼 (아바타-wrap 전체 이동) ──
  makeBtn('avatar', '👤 아바타', () => selectAvatarWrap());

  // ── 레이어 슬롯 (장착된 것만) ──
  const layerDefs = [
    { slot:'hair',   label:'💇 헤어'   },
    { slot:'top',    label:'👕 상의'   },
    { slot:'bottom', label:'👖 하의'   },
    { slot:'acc',    label:'💍 악세'   },
    { slot:'patch',  label:'🎨 패치1'  },
  ];
  layerDefs.forEach(({ slot, label }) => {
    if (S.equipped[slot]) {
      makeBtn(slot, label, () => selectLayerSlot(slot));
    }
  });

  // ── 펫 버튼 (장착된 경우) ──
  if (S.equipped.pet) {
    const petItem = PET_ITEMS.find(i => i.id === S.equipped.pet);
    const petLabel = petItem ? '🐾 ' + petItem.label : '🐾 펫';
    makeBtn('pet', petLabel, () => selectPetSlot());
  }

  // ── 배치된 가구 버튼들 ──
  if (S.furniture && S.furniture.length > 0) {
    S.furniture.forEach((f, idx) => {
      const fi = FURNITURE.find(x => x.id === f.id);
      const label = fi ? '🪑' + fi.label : '🪑가구' + (idx+1);
      makeBtn('furn-' + idx, label, () => selectFurnSlot(idx));
    });
  }

  // 이전 선택 슬롯 유지 (자동 첫번째 클릭 제거 - 버그5 수정)
  if (activeLayerSlot) {
    const activeBtn = document.getElementById('slot-btn-' + activeLayerSlot);
    if (activeBtn) activeBtn.classList.add('active');
  } else {
    const first = panel.querySelector('.layer-slot-btn');
    if (first) first.click();
  }
}

function getLayerAdj(itemId) {
  if (!S.layerAdjust) S.layerAdjust = {};
  if (!S.layerAdjust[itemId]) S.layerAdjust[itemId] = {x:0, y:0, s:1};
  return S.layerAdjust[itemId];
}

function applyLayerTransform(el, itemId) {
  if (!itemId) return;
  const adj = getLayerAdj(itemId);
  el.style.transform = `translate(${adj.x}px,${adj.y}px) scale(${adj.s})`;
  el.style.transformOrigin = 'center center';
  el.style.zIndex = '5';
}

// ── 슬롯 패널 보이기 (장착된 슬롯만 활성화) ──
function _updateSlotPanelVisibility() {
  // 동적 슬롯 패널 재빌드 (장착/배치 상태 반영)
  if (layerEditMode) {
    _buildDynamicSlotPanel();
  }
}

// ── 모든 레이어 선택 해제 ──
function _clearLayerSelection() {
  // avatar-wrap / pet-wrap outline 제거
  const aw = document.getElementById('avatar-wrap');
  if (aw) { aw.style.outline = ''; aw.style.outlineOffset = ''; }
  const pw = document.getElementById('pet-wrap');
  if (pw) { pw.style.outline = ''; pw.style.outlineOffset = ''; }
  // 가구 outline 제거
  document.querySelectorAll('.furniture-item').forEach(el => {
    el.style.outline = '';
    el.style.zIndex = '';
  });
  _editFurnIdx = -1;
  LAYER_MAP.forEach(({elId}) => {
    const el = document.getElementById(elId);
    if (!el) return;
    el.classList.remove('av-layer-selected');
    el.style.zIndex = '';
    // 편집 모드 중이면 pointer-events:auto, 아니면 none
    el.style.pointerEvents = layerEditMode ? 'auto' : 'none';
    el.style.cursor = '';
    if (el._layerMD) { el.removeEventListener('mousedown', el._layerMD); delete el._layerMD; }
    if (el._layerTS) { el.removeEventListener('touchstart', el._layerTS); delete el._layerTS; }
    if (el._layerWH) { el.removeEventListener('wheel', el._layerWH); delete el._layerWH; }
  });
  // 슬롯 버튼 강조 해제
  document.querySelectorAll('.layer-slot-btn').forEach(b => b.classList.remove('active'));
}

// ── 아바타 wrap 선택 (전체 아바타 이동) ──

// ── 펫 선택 ──
function selectPetSlot() {

  showToast('🐾 펫 드래그=이동 | 두손가락=크기 조절');

function _attachScenePetHandlers() {
  const scene = document.getElementById('scene');
  const petWrap = document.getElementById('pet-wrap');
  if (!scene || !petWrap) return;
  _detachSceneEditHandlers();

  // 휠 - 크기
  scene._editWH = (e) => {
    if (!layerEditMode || activeLayerSlot !== 'pet') return;
    e.preventDefault();
    S.petScale = Math.max(0.3, Math.min(3.0, (S.petScale||1) - e.deltaY * 0.005));
    petWrap.style.transform = `scale(${S.petScale})`;
    petWrap.style.transformOrigin = 'center bottom';
    saveLocal(); sendRoomUpdate();
  };
  scene.addEventListener('wheel', scene._editWH, {passive:false});

  // 마우스 드래그
  scene._editMD = (e) => {
    if (!layerEditMode || activeLayerSlot !== 'pet' || e.button !== 0) return;
    const sceneRect = scene.getBoundingClientRect();
    const sx = e.clientX - (S.petPos&&S.petPos.x!=null ? (S.petPos.x/100)*sceneRect.width : sceneRect.width*0.75);
    const sy = e.clientY - (S.petPos&&S.petPos.y!=null ? sceneRect.height - (S.petPos.y/100)*sceneRect.height : sceneRect.height*0.35);
    const onMove = (ev) => {
      const px = Math.max(0, Math.min(100, (ev.clientX - sceneRect.left) / sceneRect.width * 100));
      const py = Math.max(0, Math.min(100, (sceneRect.bottom - ev.clientY) / sceneRect.height * 100));
      if (!S.petPos) S.petPos = {};
      S.petPos.x = px; S.petPos.y = py;
      petWrap.style.left   = px + '%';
      petWrap.style.bottom = py + '%';
      petWrap.style.transform = `translateX(-50%) scale(${S.petScale||1})`;
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      saveLocal(); sendRoomUpdate();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  scene.addEventListener('mousedown', scene._editMD);

  // 터치
  scene._editTS = (e) => {
    if (!layerEditMode || activeLayerSlot !== 'pet') return;
    e.preventDefault();
    const sceneRect = scene.getBoundingClientRect();
    if (e.touches.length >= 2) {
      let d0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const s0 = S.petScale || 1;
      const onPM = (ev) => {
        ev.preventDefault();
        if (ev.touches.length < 2) return;
        const d = Math.hypot(ev.touches[0].clientX - ev.touches[1].clientX, ev.touches[0].clientY - ev.touches[1].clientY);
        S.petScale = Math.max(0.3, Math.min(3.0, s0 * d / d0));
        petWrap.style.transform = `translateX(-50%) scale(${S.petScale})`;
      };
      const onPE = () => { window.removeEventListener('touchmove', onPM); window.removeEventListener('touchend', onPE); saveLocal(); sendRoomUpdate(); };
      window.addEventListener('touchmove', onPM, {passive:false});
      window.addEventListener('touchend', onPE);
    } else {
      const t = e.touches[0];
      const onDM = (ev) => {
        ev.preventDefault();
        if (ev.touches.length > 1) return;
        const px = Math.max(0, Math.min(100, (ev.touches[0].clientX - sceneRect.left) / sceneRect.width * 100));
        const py = Math.max(0, Math.min(100, (sceneRect.bottom - ev.touches[0].clientY) / sceneRect.height * 100));
        if (!S.petPos) S.petPos = {};
        S.petPos.x = px; S.petPos.y = py;
        petWrap.style.left   = px + '%';
        petWrap.style.bottom = py + '%';
        petWrap.style.transform = `translateX(-50%) scale(${S.petScale||1})`;
      };
      const onDE = () => { window.removeEventListener('touchmove', onDM); window.removeEventListener('touchend', onDE); saveLocal(); sendRoomUpdate(); };
      window.addEventListener('touchmove', onDM, {passive:false});
      window.addEventListener('touchend', onDE);
    }
  };
  scene.addEventListener('touchstart', scene._editTS, {passive:false});
}

// ── 가구 선택 ──
let _editFurnIdx = -1;
function selectFurnSlot(idx) {
  _clearLayerSelection();
  activeLayerSlot = 'furn-' + idx;
  _editFurnIdx = idx;
  document.querySelectorAll('#layer-slot-panel .layer-slot-btn').forEach(b => {

      el.style.zIndex = '';
    }

function selectLayerSlot(slot) {
  if (!layerEditMode) return;
  _clearLayerSelection();
  activeLayerSlot = slot;

  const entry = LAYER_MAP.find(m => m.slot === slot);
  if (!entry) return;
  const el = document.getElementById(entry.elId);
  if (!el) return;

  const itemId = S.equipped[slot];
  const btn = document.getElementById('slot-btn-' + slot);
  if (btn) btn.classList.add('active');

  if (!itemId) {
    showToast('⚠️ 해당 슬롯에 장착된 아이템이 없습니다');
    return;
  }

  el.classList.add('av-layer-selected');
  el.style.zIndex = '100';
  el.style.pointerEvents = 'auto';
  el.style.cursor = 'grab';

  // scene 전체에 통합 이벤트 등록 (이미지 크기 무관하게 동작)
  _attachSceneEditHandlers(el, itemId, slot);

  const slotNames = {'hair':'헤어','top':'상의','bottom':'하의','acc':'악세서리','patch':'디자인 패치'};
  showToast('✏️ ' + (slotNames[slot]||slot) + ' 선택 | 드래그=이동 | 두손가락=크기');
}

// ── scene 전체 통합 편집 핸들러 ──
function _attachSceneEditHandlers(el, itemId, slot) {
  const scene = document.getElementById('scene');
  if (!scene) return;

  // 기존 핸들러 제거
  _detachSceneEditHandlers();

  // ── 휠 (데스크탑 크기 조정) ──
  scene._editWH = (e) => {
    if (!layerEditMode) return;
    e.preventDefault();
    const adj = getLayerAdj(itemId);
    adj.s = Math.max(0.2, Math.min(4.0, adj.s - e.deltaY * 0.005));
    applyLayerTransform(el, itemId);
    saveLocal();
  };
  scene.addEventListener('wheel', scene._editWH, {passive:false});

  // ── 마우스 드래그 ──
  scene._editMD = (e) => {
    if (!layerEditMode || e.button !== 0) return;
    const adj = getLayerAdj(itemId);
    const sx = e.clientX - adj.x, sy = e.clientY - adj.y;
    const onMove = (ev) => {
      adj.x = ev.clientX - sx; adj.y = ev.clientY - sy;
      applyLayerTransform(el, itemId);
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      saveLocal();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  scene.addEventListener('mousedown', scene._editMD);

  // ── 터치: 1손가락=이동, 2손가락=핀치줌 ──
  scene._editTS = (e) => {
    if (!layerEditMode) return;
    e.preventDefault();
    const adj = getLayerAdj(itemId);

    if (e.touches.length >= 2) {
      // 핀치 줌
      let d0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const s0 = adj.s;
      const onPinchMove = (ev) => {
        ev.preventDefault();
        if (ev.touches.length < 2) return;
        const d = Math.hypot(
          ev.touches[0].clientX - ev.touches[1].clientX,
          ev.touches[0].clientY - ev.touches[1].clientY
        );
        adj.s = Math.max(0.2, Math.min(4.0, s0 * d / d0));
        applyLayerTransform(el, itemId);
      };
      const onPinchEnd = () => {
        window.removeEventListener('touchmove', onPinchMove);
        window.removeEventListener('touchend', onPinchEnd);
        saveLocal();
      };
      window.addEventListener('touchmove', onPinchMove, {passive:false});
      window.addEventListener('touchend', onPinchEnd);
    } else {
      // 1손가락 드래그
      const t = e.touches[0];
      const sx = t.clientX - adj.x, sy = t.clientY - adj.y;
      let hasPinch = false;
      const onDragMove = (ev) => {
        ev.preventDefault();
        if (ev.touches.length > 1) { hasPinch = true; return; }
        if (hasPinch) return;
        adj.x = ev.touches[0].clientX - sx;
        adj.y = ev.touches[0].clientY - sy;
        applyLayerTransform(el, itemId);
      };
      const onDragEnd = () => {
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('touchend', onDragEnd);
        saveLocal();
      };
      window.addEventListener('touchmove', onDragMove, {passive:false});
      window.addEventListener('touchend', onDragEnd);
    }
  };
  scene.addEventListener('touchstart', scene._editTS, {passive:false});
}

function _detachSceneEditHandlers() {
  const scene = document.getElementById('scene');
  if (!scene) return;
  if (scene._editWH) { scene.removeEventListener('wheel', scene._editWH); delete scene._editWH; }
  if (scene._editMD) { scene.removeEventListener('mousedown', scene._editMD); delete scene._editMD; }
  if (scene._editTS) { scene.removeEventListener('touchstart', scene._editTS); delete scene._editTS; }
  // 기존 호환성 유지
  if (scene._activeSlotWH) { scene.removeEventListener('wheel', scene._activeSlotWH); delete scene._activeSlotWH; }
}

function enableLayerDrag() {
  // 슬롯 패널 버튼 업데이트 (장착된 슬롯만 표시)
  _updateSlotPanelVisibility();
  // 처음 진입 시 첫 번째 장착 슬롯 자동 선택
  const firstEquipped = LAYER_MAP.find(m => S.equipped[m.slot]);
  if (firstEquipped) selectLayerSlot(firstEquipped.slot);
}

function disableLayerDrag() {
  activeLayerSlot = null;
  _detachSceneEditHandlers();
  LAYER_MAP.forEach(({elId}) => {
    const el = document.getElementById(elId);
    if (!el) return;
    el.style.pointerEvents = 'none';
    el.style.cursor = '';
    el.style.zIndex = '';
    el.classList.remove('av-layer-active', 'av-layer-selected');
    if (el._layerMD) { el.removeEventListener('mousedown', el._layerMD); delete el._layerMD; }
    if (el._layerTS) { el.removeEventListener('touchstart', el._layerTS); delete el._layerTS; }
    if (el._layerWH) { el.removeEventListener('wheel', el._layerWH); delete el._layerWH; }
  });
  document.querySelectorAll('.layer-slot-btn').forEach(b => b.classList.remove('active'));
}

function startLayerDragMouse(e, el, itemId) {
  if (!itemId) return;
  e.preventDefault();
  e.stopPropagation();   // avatar-wrap mousedown으로 버블링 차단
  const adj = getLayerAdj(itemId);
  const sx = e.clientX - adj.x;
  const sy = e.clientY - adj.y;
  el.style.cursor = 'grabbing';
  function onMove(ev) {
    adj.x = ev.clientX - sx;
    adj.y = ev.clientY - sy;
    applyLayerTransform(el, itemId);
  }
  function onUp() {
    el.style.cursor = 'grab';
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    saveLocal();
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function startLayerDragTouch(e, el, itemId) {
  if (!itemId) return;
  e.preventDefault(); e.stopPropagation();
  const adj = getLayerAdj(itemId);

  // 공통 정리
  function cleanup(moveFn, endFn) {
    window.removeEventListener('touchmove', moveFn);
    window.removeEventListener('touchend', endFn);
    window.removeEventListener('touchstart', onSecondFinger);
  }

  // ── 핀치 줌 시작 ──
  function startPinch(touches) {
    const d0 = Math.hypot(
      touches[0].clientX - touches[1].clientX,
      touches[0].clientY - touches[1].clientY
    );
    const s0 = adj.s;
    function onPinchMove(ev) {
      ev.preventDefault();
      if (ev.touches.length < 2) return;
      const d = Math.hypot(
        ev.touches[0].clientX - ev.touches[1].clientX,
        ev.touches[0].clientY - ev.touches[1].clientY
      );
      adj.s = Math.max(0.2, Math.min(4.0, s0 * d / d0));
      applyLayerTransform(el, itemId);
    }
    function onPinchEnd() {
      cleanup(onPinchMove, onPinchEnd);
      saveLocal();
    }
    window.addEventListener('touchmove', onPinchMove, {passive:false});
    window.addEventListener('touchend', onPinchEnd);
  }

  if (e.touches.length >= 2) {
    startPinch(e.touches);
    return;
  }

  // ── 1손가락: 위치 이동 ──
  const t = e.touches[0];
  const sx = t.clientX - adj.x;
  const sy = t.clientY - adj.y;
  function onDragMove(ev) {
    ev.preventDefault();
    if (ev.touches.length === 0) return;
    adj.x = ev.touches[0].clientX - sx;
    adj.y = ev.touches[0].clientY - sy;
    applyLayerTransform(el, itemId);
  }
  function onDragEnd() {
    cleanup(onDragMove, onDragEnd);
    saveLocal();
  }
  // 드래그 중 두 번째 손가락 추가 시 핀치로 전환
  function onSecondFinger(ev) {
    if (ev.touches.length >= 2) {
      window.removeEventListener('touchmove', onDragMove);
      window.removeEventListener('touchend', onDragEnd);
      window.removeEventListener('touchstart', onSecondFinger);
      startPinch(ev.touches);
    }
  }
  window.addEventListener('touchmove', onDragMove, {passive:false});
  window.addEventListener('touchend', onDragEnd);
  window.addEventListener('touchstart', onSecondFinger, {passive:false});
}

// 특정 슬롯 초기화
function resetLayerSlot(slot) {
  const id = S.equipped[slot]; if (!id) return;
  if (S.layerAdjust) delete S.layerAdjust[id];
  updateScene(); saveLocal();
  showToast('↩️ 초기화');
}

// 전체 레이어 초기화
function resetAllLayers() {
  S.layerAdjust = {};
  updateScene(); saveLocal();
  showToast('↩️ 모든 옷 위치·크기 초기화');
}

  const categoryMap = [

  showToast('🔓 모든 아이템 잠금 해제! 코인 9999 지급!');
}

// standalone 모드일 때 dev 버튼 표시
window.addEventListener('load', () => {
  if (window.parent === window) {
    const btn = document.getElementById('dev-unlock-btn');
    if (btn) btn.style.display = 'block';
  }
});

</script>
