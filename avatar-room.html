<!DOCTYPE html>
<html lang="ko">
<head>

<title>Avatar Room Module</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#f0eaf8;font-family:'Segoe UI',sans-serif;}
img{image-rendering:pixelated;image-rendering:crisp-edges;}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#fff;box-shadow:0 0 20px rgba(0,0,0,.15);}

/* ===== SCENE (상단 50%) ===== */
#scene{
  position:relative;flex:0 0 50vh;min-height:220px;overflow:hidden;
  background:#c8e6f8;border-bottom:3px solid #a0c4e8;
}
#room-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  image-rendering:pixelated;transition:background-image .3s;
}
#furniture-layer{position:absolute;inset:0;pointer-events:none;}
.furniture-item{
  position:absolute;width:48px;height:48px;cursor:grab;
  image-rendering:pixelated;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3));
  user-select:none;pointer-events:all;
  transition:transform .1s;
}
.furniture-item:active{cursor:grabbing;transform:scale(1.1);}
#avatar-wrap{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  width:72px;height:96px;
}
#avatar-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;}
#pet-wrap{
  position:absolute;bottom:8px;right:16px;
  width:52px;height:52px;
}
#pet-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;}
#couple-on-pet{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;
}
#coin-hud{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.55);color:#ffe066;font-size:12px;font-weight:700;
  padding:4px 8px;border-radius:12px;letter-spacing:.5px;
}
#lv-hud{
  position:absolute;top:8px;left:8px;
  background:rgba(80,40,160,.7);color:#fff;font-size:11px;font-weight:700;
  padding:4px 7px;border-radius:12px;
}
#scene-msg{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 10px;border-radius:8px;
  opacity:0;transition:opacity .4s;white-space:nowrap;
}

/* ===== TAB BAR ===== */
#tabs{
  display:flex;background:#5c35a0;padding:0;flex-shrink:0;
  border-bottom:2px solid #3d1f80;
}
.tab-btn{
  flex:1;padding:8px 0;border:none;background:transparent;
  color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:background .2s,color .2s;
}
.tab-btn .ti{font-size:16px;}
.tab-btn.active{background:rgba(255,255,255,.2);color:#ffe066;border-bottom:2px solid #ffe066;}
.tab-btn:hover{background:rgba(255,255,255,.1);}

/* ===== PANEL ===== */
#panel{flex:1;overflow-y:auto;overflow-x:hidden;background:#f7f2ff;}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:#c0a0e0;border-radius:2px;}

/* ===== SECTION HEADER ===== */
.sec-head{
  background:#e8dcf8;padding:6px 12px;font-size:11px;font-weight:700;
  color:#5c35a0;letter-spacing:.5px;text-transform:uppercase;
  border-bottom:1px solid #d0b8f0;position:sticky;top:0;z-index:2;
}

/* ===== ITEM GRID ===== */
.item-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;padding:8px;
}
.item-card{
  background:#fff;border:2px solid #e0d0f8;border-radius:8px;
  padding:6px;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:border-color .2s,transform .1s,box-shadow .2s;
  position:relative;min-height:70px;
}
.item-card:hover{border-color:#a060e0;box-shadow:0 2px 8px rgba(160,96,224,.3);}
.item-card.equipped{border-color:#5c35a0;background:#f0e8ff;box-shadow:0 0 0 2px #a060e0;}
.item-card.locked{opacity:.55;cursor:not-allowed;}
.item-card img{width:48px;height:48px;object-fit:contain;}
.item-card .iname{font-size:9px;color:#666;margin-top:3px;text-align:center;line-height:1.2;}
.item-card .iprice{
  font-size:9px;color:#c07000;font-weight:700;
  background:#fff8e0;padding:1px 4px;border-radius:4px;margin-top:2px;
}
.item-card .lock-icon{
  position:absolute;top:3px;right:3px;font-size:12px;
}
.item-card.free-badge::after{
  content:'FREE';position:absolute;top:2px;left:2px;
  font-size:7px;font-weight:800;color:#fff;background:#22b060;
  padding:1px 3px;border-radius:3px;
}

/* ===== AVATAR SELECTOR ===== */
.avatar-selector{
  display:flex;gap:8px;padding:10px;overflow-x:auto;
}
.avatar-option{
  flex-shrink:0;border:2px solid #e0d0f8;border-radius:10px;padding:6px;
  cursor:pointer;text-align:center;background:#fff;transition:border-color .2s;
  width:64px;
}
.avatar-option img{width:48px;height:56px;object-fit:contain;}
.avatar-option span{font-size:9px;color:#666;display:block;margin-top:3px;}
.avatar-option.selected{border-color:#5c35a0;background:#f0e8ff;}

/* ===== EXPRESSION SELECTOR ===== */
.expr-row{display:flex;gap:6px;padding:6px 10px;}
.expr-btn{
  flex:1;padding:6px 4px;border:1px solid #d0b8f0;border-radius:6px;
  background:#fff;cursor:pointer;font-size:10px;text-align:center;transition:background .2s;
}
.expr-btn.active{background:#a060e0;color:#fff;border-color:#5c35a0;}

/* ===== FURNITURE PLACEMENT ===== */
#furniture-tray{
  display:flex;gap:6px;padding:8px;overflow-x:auto;
  border-top:1px solid #e0d0f8;
}
.furn-tray-item{
  flex-shrink:0;width:52px;height:52px;border:2px solid #e0d0f8;border-radius:6px;
  background:#fff;cursor:grab;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.furn-tray-item img{width:40px;height:40px;object-fit:contain;}
.furn-tray-item .fcount{
  position:absolute;top:1px;right:2px;font-size:8px;font-weight:700;color:#5c35a0;
}
#place-hint{
  font-size:11px;color:#888;text-align:center;padding:6px;
  background:#f0e8ff;border-radius:6px;margin:4px 8px;
}

/* ===== BUY CONFIRM MODAL ===== */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:100;align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex;}
#modal-box{
  background:#fff;border-radius:16px;padding:20px;max-width:280px;width:90%;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);
}
#modal-box h3{font-size:14px;color:#3d1f80;margin-bottom:8px;}
#modal-box p{font-size:12px;color:#666;margin-bottom:14px;}
#modal-box .mimg{width:72px;height:72px;object-fit:contain;margin:0 auto 8px;display:block;}
.modal-btns{display:flex;gap:8px;}
.mbtn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
.mbtn-cancel{background:#eee;color:#666;}
.mbtn-buy{background:#5c35a0;color:#fff;}
.mbtn-buy:disabled{background:#aaa;cursor:not-allowed;}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:12px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;}

/* ===== SCROLLBAR HIDE for tray ===== */
.avatar-selector::-webkit-scrollbar,
#furniture-tray::-webkit-scrollbar{height:3px;}
.avatar-selector::-webkit-scrollbar-thumb,
#furniture-tray::-webkit-scrollbar-thumb{background:#c0a0e0;}
</style>
</head>

</div><!-- /app -->

    hair: null, top: null, bottom: null, shoe: null, acc: null,
    pet: null, couple: null
  },
  roomBg: 'day',
  furniture: [],   // [{id, x, y}]
  unlocked: {
    hair:    ['h0'],
    top:     ['t0'],
    bottom:  ['b0'],
    shoe:    ['s0'],
    acc:     [],
    pet:     ['p_gecko','p_hamster'],
    couple:  [],
    room:    ['day'],
    furniture: []
  }
};

let pendingBuy = null;  // 구매 대기 아이템
let curTab = 'avatar';
let draggingFurn = null;
let draggingEl = null;

// ============================================================
// ④ postMessage 통신
// ============================================================
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'INIT') {
    if (d.coins  !== undefined) S.coins  = d.coins;
    if (d.lv     !== undefined) S.lv     = d.lv;
    if (d.equipped)  Object.assign(S.equipped, d.equipped);
    if (d.roomBg)    S.roomBg = d.roomBg;
    if (d.furniture) S.furniture = d.furniture || [];
    if (d.unlocked) {
      for (const k in d.unlocked) {
        if (S.unlocked[k]) S.unlocked[k] = d.unlocked[k];
      }
    }
    if (d.curAvatar) S.curAvatar = d.curAvatar;
    saveLocal();
    renderAll();
    showToast('💫 데이터 로드 완료!');
  }

  if (d.type === 'COINS_UPDATE') {
    S.coins = d.coins;
    updateHUD();
  }
});

function sendToParent(msg) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(msg, '*');
  }
}

// ============================================================
// ⑤ 로컬 저장/로드 (standalone 모드 fallback)
// ============================================================
function saveLocal() {
  try { localStorage.setItem('avatarRoomState', JSON.stringify(S)); } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('avatarRoomState');
    if (raw) { const saved = JSON.parse(raw); Object.assign(S, saved); }
  } catch(e) {}
}

// ============================================================
// ⑥ 렌더링
// ============================================================
function renderAll() {
  updateHUD();
  updateScene();
  renderPanel();
}

function updateHUD() {
  document.getElementById('coin-count').textContent = S.coins.toLocaleString();
  document.getElementById('lv-num').textContent = S.lv;
}

function getAvatarFile(id, expr) {
  const av = AVATARS.find(a => a.id === id);
  if (!av) return '';
  if (expr === 'happy') return av.happyFile;
  if (expr === 'tired') return av.tiredFile;
  return av.file;
}

function updateScene() {
  // Room background
  const bgItem = ROOM_BG.find(r => r.id === S.roomBg) || ROOM_BG[0];
  const bgEl = document.getElementById('room-bg');
  bgEl.style.backgroundImage = `url('${assetUrl(bgItem.file)}')`;
  bgEl.style.backgroundSize = 'cover';

  // Avatar body
  const bodyUrl = assetUrl(getAvatarFile(S.curAvatar, S.curExpr));
  setImgSrc('av-body', bodyUrl);

  // Hair
  setEquippedLayer('av-hair',   S.equipped.hair,   HAIR_ITEMS);
  setEquippedLayer('av-top',    S.equipped.top,     TOP_ITEMS);
  setEquippedLayer('av-bot',    S.equipped.bottom,  BOTTOM_ITEMS);
  setEquippedLayer('av-shoe',   S.equipped.shoe,    SHOE_ITEMS);
  setEquippedLayer('av-acc',    S.equipped.acc,     ACC_ITEMS);

  // Couple item on avatar
  setEquippedLayer('av-couple-av', S.equipped.couple, COUPLE_ITEMS);

  // Pet
  const petWrap = document.getElementById('pet-wrap');
  if (S.equipped.pet) {
    const petItem = PET_ITEMS.find(p => p.id === S.equipped.pet);
    if (petItem) {
      setImgSrc('pet-body', assetUrl(petItem.file));
      petWrap.style.display = 'block';
      // Couple item on pet
      setEquippedLayer('couple-on-pet', S.equipped.couple, COUPLE_ITEMS);
    }
  } else {
    petWrap.style.display = 'none';
  }

  // Furniture
  renderFurnitureLayer();
}

function setImgSrc(id, src) {
  const el = document.getElementById(id);
  if (!el) return;
  el.src = src;
  el.style.opacity = '1';
  el.onerror = () => { el.style.opacity = '0'; };
}

function setEquippedLayer(elId, equippedId, items) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!equippedId) { el.style.opacity = '0'; el.src = ''; return; }
  const item = items.find(i => i.id === equippedId);
  if (!item) { el.style.opacity = '0'; return; }
  el.src = assetUrl(item.file);
  el.style.opacity = '1';
  el.onerror = () => { el.style.opacity = '0'; };
}

function renderFurnitureLayer() {
  const layer = document.getElementById('furniture-layer');
  layer.innerHTML = '';
  S.furniture.forEach((f, idx) => {
    const fItem = FURNITURE.find(fi => fi.id === f.id);
    if (!fItem) return;
    const el = document.createElement('img');
    el.className = 'furniture-item';
    el.src = assetUrl(fItem.file);
    el.style.left  = f.x + 'px';
    el.style.bottom = f.y + 'px';
    el.title = fItem.label;
    el.dataset.idx = idx;
    el.addEventListener('mousedown',  (e) => startFurnDrag(e, el, idx));
    el.addEventListener('touchstart', (e) => startFurnDragTouch(e, el, idx), {passive:true});
    el.addEventListener('dblclick', () => removeFurniture(idx));
    layer.appendChild(el);
  });
}

// ============================================================
// ⑦ 패널 탭 렌더링
// ============================================================
function setTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderPanel();
}

function renderPanel() {
  const p = document.getElementById('panel');
  p.innerHTML = '';

  switch(curTab) {
    case 'avatar': renderAvatarPanel(p); break;
    case 'room':   renderRoomPanel(p);   break;
    case 'pet':    renderPetPanel(p);    break;
    case 'couple': renderCouplePanel(p); break;
    case 'shop':   renderShopPanel(p);   break;
  }
}

// ---- Avatar Panel ----
function renderAvatarPanel(p) {
  // Avatar type selector
  addSecHead(p, '캐릭터 선택');
  const avSel = document.createElement('div');
  avSel.className = 'avatar-selector';
  AVATARS.forEach(av => {
    const opt = document.createElement('div');
    opt.className = 'avatar-option' + (S.curAvatar === av.id ? ' selected' : '');
    opt.innerHTML = `<img src="${assetUrl(av.file)}" alt="${av.label}"><span>${av.label}</span>`;
    opt.onclick = () => {
      S.curAvatar = av.id;
      saveLocal();
      sendEquip();
      updateScene();
      renderPanel();
    };
    avSel.appendChild(opt);
  });
  p.appendChild(avSel);

  // Expression
  addSecHead(p, '표정');
  const exprRow = document.createElement('div');
  exprRow.className = 'expr-row';
  const exprs = [{v:'neutral',l:'😐 무표정'},{v:'happy',l:'😄 밝음'},{v:'tired',l:'😫 힘빠짐'}];
  exprs.forEach(ex => {
    const b = document.createElement('button');
    b.className = 'expr-btn' + (S.curExpr === ex.v ? ' active' : '');
    b.textContent = ex.l;
    b.onclick = () => {
      S.curExpr = ex.v;
      saveLocal();
      sendEquip();
      updateScene();
      renderPanel();
    };
    exprRow.appendChild(b);
  });
  p.appendChild(exprRow);

  // Hair
  addSecHead(p, '헤어 & 모자');
  renderItemGrid(p, HAIR_ITEMS, S.unlocked.hair, S.equipped.hair, (id) => onEquip('hair', id, HAIR_ITEMS));

  // Top
  addSecHead(p, '상의');
  renderItemGrid(p, TOP_ITEMS, S.unlocked.top, S.equipped.top, (id) => onEquip('top', id, TOP_ITEMS));

  // Bottom
  addSecHead(p, '하의');
  renderItemGrid(p, BOTTOM_ITEMS, S.unlocked.bottom, S.equipped.bottom, (id) => onEquip('bottom', id, BOTTOM_ITEMS));

  // Shoes
  addSecHead(p, '신발');
  renderItemGrid(p, SHOE_ITEMS, S.unlocked.shoe, S.equipped.shoe, (id) => onEquip('shoe', id, SHOE_ITEMS));

  // Accessories
  addSecHead(p, '악세사리');
  renderItemGrid(p, ACC_ITEMS, S.unlocked.acc, S.equipped.acc, (id) => onEquip('acc', id, ACC_ITEMS));
}

// ---- Room Panel ----
function renderRoomPanel(p) {
  addSecHead(p, '방 배경');
  renderItemGrid(p, ROOM_BG, S.unlocked.room, S.roomBg, (id) => {
    S.roomBg = id;
    saveLocal();
    sendRoomUpdate();
    updateScene();
  }, true);

  addSecHead(p, '가구 배치 (드래그하여 방에 놓기)');
  const hint = document.createElement('div');
  hint.id = 'place-hint';
  hint.textContent = '💡 아이템을 꾹 누른 채 방 안으로 드래그하세요. 더블클릭으로 제거';
  p.appendChild(hint);

  const tray = document.createElement('div');
  tray.id = 'furniture-tray';
  tray.className = 'furniture-tray';

  FURNITURE.forEach(fi => {
    const owned = S.unlocked.furniture.includes(fi.id);
    const placed = S.furniture.filter(f => f.id === fi.id).length;

    const card = document.createElement('div');
    card.className = 'furn-tray-item' + (owned ? '' : ' locked');
    card.style.opacity = owned ? '1' : '.45';

    if (placed > 0) {
      const cnt = document.createElement('span');
      cnt.className = 'fcount';
      cnt.textContent = '×' + placed;
      card.appendChild(cnt);
    }

    const img = document.createElement('img');
    img.src = assetUrl(fi.file);
    img.alt = fi.label;
    card.appendChild(img);

    if (owned) {
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        draggingFurn = fi.id;
        e.dataTransfer.effectAllowed = 'copy';
      });
      card.addEventListener('touchstart', (e) => {
        draggingFurn = fi.id;
      }, {passive:true});
    } else {
      card.title = `🔒 ${fi.label} - ${fi.price} 코인 (상점에서 구매)`;
      card.onclick = () => showToast(`🔒 ${fi.label}은 상점에서 구매 후 배치 가능해요`);
    }
    tray.appendChild(card);
  });

  // Drop target on scene
  const scene = document.getElementById('scene');
  scene.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  scene.ondrop = (e) => {
    e.preventDefault();
    if (!draggingFurn) return;
    const rect = scene.getBoundingClientRect();
    const x = Math.max(0, Math.min(e.clientX - rect.left - 24, rect.width - 48));
    const y = Math.max(0, rect.bottom - e.clientY - 24);
    S.furniture.push({ id: draggingFurn, x: Math.round(x), y: Math.round(y) });
    draggingFurn = null;
    saveLocal();
    sendRoomUpdate();
    renderFurnitureLayer();
  };

  p.appendChild(tray);
}

// ---- Pet Panel ----
function renderPetPanel(p) {
  addSecHead(p, '펫 선택');
  renderItemGrid(p, PET_ITEMS, S.unlocked.pet, S.equipped.pet, (id) => {
    S.equipped.pet = (S.equipped.pet === id) ? null : id;
    saveLocal();
    sendEquip();
    updateScene();
    renderPanel();
  }, true);
}

// ---- Couple Panel ----
function renderCouplePanel(p) {
  const hasPet = !!S.equipped.pet;
  if (!hasPet) {
    addSecHead(p, '커플 아이템');
    const msg = document.createElement('div');
    msg.style.cssText = 'text-align:center;padding:20px;color:#888;font-size:12px;';
    msg.innerHTML = '🐾 먼저 <strong>펫 탭</strong>에서 펫을 선택하세요!<br>펫이 있어야 커플템을 착용할 수 있어요.';
    p.appendChild(msg);
    return;
  }
  addSecHead(p, '커플 아이템 (아바타 + 펫 매칭)');
  renderItemGrid(p, COUPLE_ITEMS, S.unlocked.couple, S.equipped.couple, (id) => {
    S.equipped.couple = (S.equipped.couple === id) ? null : id;
    saveLocal();
    sendEquip();
    updateScene();
    renderPanel();
  }, true);
}

// ---- Shop Panel ----
function renderShopPanel(p) {
  const categories = [
    { label:'헤어 & 모자', items: HAIR_ITEMS,    key:'hair'    },
    { label:'상의',        items: TOP_ITEMS,     key:'top'     },
    { label:'하의',        items: BOTTOM_ITEMS,  key:'bottom'  },
    { label:'신발',        items: SHOE_ITEMS,    key:'shoe'    },
    { label:'악세사리',     items: ACC_ITEMS,     key:'acc'     },
    { label:'방 배경',     items: ROOM_BG,       key:'room'    },
    { label:'가구',        items: FURNITURE,     key:'furniture'},
    { label:'펫',          items: PET_ITEMS,     key:'pet'     },
    { label:'커플 아이템',  items: COUPLE_ITEMS,  key:'couple'  },
  ];

  const shopNote = document.createElement('div');
  shopNote.style.cssText='font-size:11px;color:#888;padding:6px 12px;text-align:center;background:#fff;border-bottom:1px solid #eee;';
  shopNote.textContent = `💰 보유 코인: ${S.coins.toLocaleString()}  |  보유 아이템만 착용 가능`;
  p.appendChild(shopNote);

  categories.forEach(cat => {
    const unpurchased = cat.items.filter(item => !S.unlocked[cat.key].includes(item.id) && item.price > 0);
    if (unpurchased.length === 0) return;

    addSecHead(p, cat.label);
    renderItemGrid(p, unpurchased, [], null, (id) => {
      const item = cat.items.find(i => i.id === id);
      if (item) showBuyModal(item, cat.key);
    }, false, true);
  });
}

// ---- Helpers ----
function addSecHead(parent, text) {
  const h = document.createElement('div');
  h.className = 'sec-head';
  h.textContent = text;
  parent.appendChild(h);
}

function renderItemGrid(parent, items, unlockedArr, equippedId, onClickCb, isRoom=false, shopMode=false) {
  const grid = document.createElement('div');
  grid.className = 'item-grid';

  items.forEach(item => {
    const owned   = unlockedArr.includes(item.id);
    const isEquip = (equippedId === item.id);
    const free    = item.price === 0;

    const card = document.createElement('div');
    card.className = 'item-card';
    if (isEquip) card.classList.add('equipped');
    if (!owned && !shopMode) card.classList.add('locked');
    if (free && !owned && !shopMode) card.classList.add('free-badge');

    const img = document.createElement('img');
    img.src = assetUrl(item.file);
    img.alt = item.label;
    img.onerror = () => {
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'width:48px;height:48px;background:#e8d8f8;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;';
      ph.textContent = '🎨';
      card.insertBefore(ph, card.firstChild);
    };
    card.appendChild(img);

    const name = document.createElement('span');
    name.className = 'iname';
    name.textContent = item.label;
    card.appendChild(name);

    if (!owned || shopMode) {
      if (item.price > 0) {
        const priceEl = document.createElement('span');
        priceEl.className = 'iprice';
        priceEl.textContent = `💰${item.price}`;
        card.appendChild(priceEl);
      }
      if (!owned && !shopMode && !free) {
        const lock = document.createElement('span');
        lock.className = 'lock-icon';
        lock.textContent = '🔒';
        card.appendChild(lock);
      }
    }

    if (isEquip) {
      const check = document.createElement('span');
      check.style.cssText = 'position:absolute;top:2px;right:2px;font-size:12px;';
      check.textContent = '✅';
      card.appendChild(check);
    }

    card.onclick = () => {
      if (!owned && !shopMode) {
        if (free) {
          // Auto-unlock free items
          S.unlocked[getCategoryKey(item, items)].push(item.id);
          saveLocal();
          onClickCb(item.id);
          renderPanel();
        } else {
          showBuyModal(item, getCategoryKey(item, items));
        }
      } else {
        onClickCb(item.id);
        renderPanel();
      }
    };
    grid.appendChild(card);
  });
  parent.appendChild(grid);
}

function getCategoryKey(item, items) {
  if (HAIR_ITEMS.includes(item))    return 'hair';
  if (TOP_ITEMS.includes(item))     return 'top';
  if (BOTTOM_ITEMS.includes(item))  return 'bottom';
  if (SHOE_ITEMS.includes(item))    return 'shoe';
  if (ACC_ITEMS.includes(item))     return 'acc';
  if (ROOM_BG.includes(item))       return 'room';
  if (FURNITURE.includes(item))     return 'furniture';
  if (PET_ITEMS.includes(item))     return 'pet';
  if (COUPLE_ITEMS.includes(item))  return 'couple';
  return 'misc';
}

// ============================================================
// ⑧ 구매 시스템
// ============================================================
function showBuyModal(item, categoryKey) {
  pendingBuy = { item, categoryKey };
  document.getElementById('m-title').textContent = '아이템 구매';
  document.getElementById('m-img').src = assetUrl(item.file);
  document.getElementById('m-img').onerror = () => { document.getElementById('m-img').style.display='none'; };
  document.getElementById('m-desc').innerHTML =
    `<strong>${item.label}</strong><br>💰 ${item.price} 코인<br><small>현재 보유: ${S.coins.toLocaleString()} 코인</small>`;
  const buyBtn = document.getElementById('m-buybtn');
  buyBtn.disabled = S.coins < item.price;
  buyBtn.textContent = S.coins < item.price ? '코인 부족 😢' : '구매하기 💰';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  pendingBuy = null;
}

function confirmBuy() {
  if (!pendingBuy) return;
  const { item, categoryKey } = pendingBuy;
  if (S.coins < item.price) { showToast('💸 코인이 부족해요!'); return; }

  S.coins -= item.price;
  if (!S.unlocked[categoryKey]) S.unlocked[categoryKey] = [];
  S.unlocked[categoryKey].push(item.id);

  saveLocal();
  closeModal();
  showToast(`✨ ${item.label} 구매 완료!`);

  // Send to parent
  sendToParent({
    type: 'PURCHASE',
    cost: item.price,
    itemId: item.id,
    category: categoryKey,
    coins: S.coins,
    unlocked: S.unlocked,
  });

  renderAll();
}

// ============================================================
// ⑨ 착용 / 방 업데이트 → 부모에 전송
// ============================================================
function onEquip(slot, id, items) {
  const owned = S.unlocked[slot] && S.unlocked[slot].includes(id);
  if (!owned) {
    const item = items.find(i => i.id === id);
    if (item) showBuyModal(item, slot);
    return;
  }
  S.equipped[slot] = (S.equipped[slot] === id) ? null : id;
  saveLocal();
  sendEquip();
  updateScene();
}

function sendEquip() {
  sendToParent({
    type: 'EQUIP',
    curAvatar: S.curAvatar,
    curExpr: S.curExpr,
    equipped: { ...S.equipped },
  });
}

function sendRoomUpdate() {
  sendToParent({
    type: 'ROOM_UPDATE',
    roomBg: S.roomBg,
    furniture: [...S.furniture],
  });
}

// ============================================================
// ⑩ 가구 드래그 (씬 내에서 이동)
// ============================================================
function startFurnDrag(e, el, idx) {
  e.preventDefault();
  draggingEl = { el, idx };
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();

  function onMove(ev) {
    const x = Math.max(0, Math.min(ev.clientX - sceneRect.left - 24, sceneRect.width - 48));
    const y = Math.max(0, sceneRect.bottom - ev.clientY - 24);
    el.style.left = x + 'px';
    el.style.bottom = y + 'px';
    S.furniture[idx].x = Math.round(x);
    S.furniture[idx].y = Math.round(y);
  }
  function onUp() {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    saveLocal();
    sendRoomUpdate();
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function startFurnDragTouch(e, el, idx) {
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();

  function onMove(ev) {
    const t = ev.touches[0];
    const x = Math.max(0, Math.min(t.clientX - sceneRect.left - 24, sceneRect.width - 48));
    const y = Math.max(0, sceneRect.bottom - t.clientY - 24);
    el.style.left = x + 'px';
    el.style.bottom = y + 'px';
    S.furniture[idx].x = Math.round(x);
    S.furniture[idx].y = Math.round(y);
  }
  function onEnd() {
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onEnd);
    saveLocal();
    sendRoomUpdate();
  }
  window.addEventListener('touchmove', onMove, {passive:true});
  window.addEventListener('touchend', onEnd);
}

function removeFurniture(idx) {
  S.furniture.splice(idx, 1);
  saveLocal();
  sendRoomUpdate();
  renderFurnitureLayer();
  showToast('🗑 가구를 제거했어요');
}

// ============================================================
// ⑪ 토스트 메시지
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function showSceneMsg(msg) {
  const el = document.getElementById('scene-msg');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

// ============================================================
// ⑫ 초기화
// ============================================================
function init() {
  // standalone 모드면 localStorage에서 로드
  if (window.parent === window) {
    loadLocal();
    showToast('🎮 Standalone 모드 (iframe 없음)');
  }
  // 무료 아이템 자동 해제
  autoUnlockFreeItems();
  renderAll();

  // 부모에게 준비 완료 알림
  sendToParent({ type: 'READY' });
}

function autoUnlockFreeItems() {
  const allCategories = [
    { key:'hair',     items: HAIR_ITEMS    },
    { key:'top',      items: TOP_ITEMS     },
    { key:'bottom',   items: BOTTOM_ITEMS  },
    { key:'shoe',     items: SHOE_ITEMS    },
    { key:'acc',      items: ACC_ITEMS     },
    { key:'room',     items: ROOM_BG       },
    { key:'furniture',items: FURNITURE     },
    { key:'pet',      items: PET_ITEMS     },
    { key:'couple',   items: COUPLE_ITEMS  },
  ];
  allCategories.forEach(cat => {
    cat.items.filter(i => i.price === 0).forEach(i => {
      if (!S.unlocked[cat.key].includes(i.id)) {
        S.unlocked[cat.key].push(i.id);
      }
    });
  });
}

// Start
window.addEventListener('DOMContentLoaded', init);
